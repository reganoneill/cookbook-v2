<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Cookbook Admin</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "reganoneill/cookbook-v2",
            branch: "main",
            auth_type: "pkce",
            app_id: "Ov23liYgyTvzAjPWpg5h",
          },
          media_folder: "public/images",
          public_folder: "/images",
          collections: [
            {
              name: "recipes",
              label: "Recipes",
              folder: "src/data/recipes",
              create: true,
              delete: true,
              slug: "{{slug}}",
              extension: "json",
              format: "json",
              identifier_field: "title",
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly name, e.g. cajun-red-beans-and-rice" },
                { label: "Public", name: "public", widget: "boolean", default: true },
                { label: "Difficulty", name: "difficulty", widget: "select", options: ["easy", "medium", "hard"], required: false },
                { label: "Prep Time", name: "prepTime", widget: "string", required: false },
                { label: "Cook Time", name: "cookTime", widget: "string", required: false },
                { label: "Keywords", name: "keywords", widget: "list", required: false, hint: "e.g. dinner, favorites, soup" },
                {
                  label: "Ingredients",
                  name: "ingredients",
                  widget: "list",
                  fields: [
                    { label: "Ingredient", name: "name", widget: "string" },
                    { label: "Amount", name: "amount", widget: "string" },
                  ],
                },
                { label: "Steps", name: "steps", widget: "list" },
                { label: "Notes", name: "notes", widget: "text", required: false },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
